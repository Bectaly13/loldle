<ion-content #contentRef [fullscreen]="true">

    <app-navbar title="Caractéristiques" />

  	@if(champion) {
		<div class="game-container">
			<div class="question">Quel est {{attributeDisplay}} de <strong>{{champion.name}}</strong> ?</div>
			<div class="image-container">
				<img [src]="'assets/champion-icons/' + champion.name + '.png'">
			</div>

			@if(!showResult) {
				<ion-button (click)="submit()">Valider</ion-button>
			}

			@else {
				<ion-button (click)="resetGame()">Rejouer</ion-button>
				
				<div class="result-container">
					@if(won) {
						<div class="result">Bonne réponse !</div>
					}

					@else {
						<div class="result">Mauvaise réponse !</div>
						<div class="answer">La bonne réponse était : {{answer.join(", ")}}</div>
					}
				</div>
			}

			<ion-list>
				@for(choice of choices ; track $index) {
					<ion-item
						(click)="toggleCheckbox($index)"
						[class.selected]="selectedChoices[$index]"
						lines="none">
						<ion-checkbox
							slot="start"
							[(ngModel)]="selectedChoices[$index]"
							[value]="choice"
							[disabled]="showResult"
							(click)="$event.stopPropagation()"
        					(ionChange)="onCheckboxChange($index, $event)">
						</ion-checkbox>
						<ion-label>{{choice}}</ion-label>
					</ion-item>
				}
			</ion-list>
		</div>
	}

</ion-content>
